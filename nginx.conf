# ───── HTTP (porta 80) ─────────────────────────────────────────
server {
    listen 80;
    server_name hub.sal.com.br;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar tudo para HTTPS após emitir o certificado
    location / {
        # Comente esta linha durante o setup inicial sem SSL:
        return 301 https://$host$request_uri;
    }
}

