<style>
  html, body { background: #0A0A0F; color: #E8E8F0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    font-feature-settings: "cv11", "ss01", "ss03";
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(126, 48, 225, 0.15), transparent 70%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(126, 48, 225, 0.08), transparent 70%);

    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "calt" 1, "ss01" 1; }
  .display { font-family: 'Inter Tight', 'Inter', sans-serif; letter-spacing: -0.022em; }

  ::selection { background: #7E30E1; color: white; }

  /* Scrollbars elegantes */
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #2A2A3A; border-radius: 3px; }
  *::-webkit-scrollbar-thumb:hover { background: #3A3A4D; }

  /* Componentes base */
  .card {
    background: linear-gradient(180deg, #13131C 0%, #0E0E14 100%);
    border: 1px solid #1F1F2D;
    border-radius: 12px;
    transition: border-color .15s ease;
  }
  .card-hover:hover { border-color: #2A2A3A; }
  .card-elevated {
    background: linear-gradient(180deg, #1A1A26 0%, #13131C 100%);
    border: 1px solid #2A2A3A;
    border-radius: 12px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.3);
  }

  .glass {
    background: rgba(14,14,20,0.7);
    backdrop-filter: saturate(160%) blur(14px);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
  }

  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; line-height: 1.5; letter-spacing: 0.01em; }
  .badge-success { background: rgba(16, 185, 129, 0.12); color: #34D399; border: 1px solid rgba(16, 185, 129, 0.2); }
  .badge-warning { background: rgba(245, 158, 11, 0.12); color: #FBBF24; border: 1px solid rgba(245, 158, 11, 0.2); }
  .badge-destructive { background: rgba(239, 68, 68, 0.12); color: #F87171; border: 1px solid rgba(239, 68, 68, 0.2); }
  .badge-info { background: rgba(59, 130, 246, 0.12); color: #60A5FA; border: 1px solid rgba(59, 130, 246, 0.2); }
  .badge-sal { background: rgba(126, 48, 225, 0.15); color: #B794F4; border: 1px solid rgba(126, 48, 225, 0.3); }
  .badge-muted { background: #1A1A26; color: #9696A8; border: 1px solid #2A2A3A; }
  .badge-outline { border: 1px solid #2A2A3A; color: #C0C0D0; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; line-height: 1; user-select: none; }
  .btn-primary { background: #7E30E1; color: white; box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 1px 2px rgba(126,48,225,0.4); }
  .btn-primary:hover { background: #8B3DEE; }
  .btn-outline { background: #13131C; border: 1px solid #2A2A3A; color: #E8E8F0; }
  .btn-outline:hover { background: #1A1A26; border-color: #3A3A4D; }
  .btn-ghost { color: #9696A8; }
  .btn-ghost:hover { background: #1A1A26; color: #E8E8F0; }
  .btn-destructive { background: #DC2626; color: white; }
  .btn-destructive:hover { background: #EF4444; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-icon { padding: 8px; border-radius: 8px; cursor: pointer; color: #9696A8; transition: all .15s; }
  .btn-icon:hover { background: #1A1A26; color: #E8E8F0; }

  .input { background: #0E0E14; border: 1px solid #1F1F2D; border-radius: 8px; padding: 8px 12px; color: #E8E8F0; font-size: 13px; outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; }
  .input:focus { border-color: #7E30E1; box-shadow: 0 0 0 3px rgba(126,48,225,0.15); }
  .input-mini { padding: 6px 10px; font-size: 12px; }

  .nav-link { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 7px; font-size: 13px; color: #9696A8; cursor: pointer; transition: all .12s ease; font-weight: 450; }
  .nav-link:hover { background: rgba(255,255,255,0.04); color: #E8E8F0; }
  .nav-link.active { background: rgba(126, 48, 225, 0.12); color: #B794F4; font-weight: 500; box-shadow: inset 2px 0 0 #7E30E1; }

  .nav-section-title { padding: 0 10px; margin-bottom: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #6B6B7B; }

  .tab-strip { display: inline-flex; padding: 3px; background: #13131C; border: 1px solid #1F1F2D; border-radius: 9px; gap: 2px; }
  .tab { padding: 6px 12px; border-radius: 6px; font-size: 12.5px; font-weight: 500; color: #9696A8; cursor: pointer; transition: all .12s; }
  .tab:hover { color: #E8E8F0; }
  .tab.active { background: #1A1A26; color: #E8E8F0; box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 1px 2px rgba(0,0,0,0.4); }

  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 9999px; font-size: 11.5px; font-weight: 500; border: 1px solid; cursor: pointer; transition: all 0.12s; }

  .kbd { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 5px; border-radius: 4px; background: #1A1A26; border: 1px solid #2A2A3A; color: #9696A8; }

  /* Notion-style transcript */
  .transcript-block { padding: 6px 0; }
  .transcript-block:hover .transcript-time { opacity: 1; }
  .transcript-time { opacity: 0.5; transition: opacity .15s; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #6B6B7B; }
  .transcript-speaker { font-weight: 600; font-size: 12.5px; color: #B794F4; }

  /* Obsidian-style note editor */
  .note-tag { color: #7E30E1; font-weight: 500; }
  .note-link { color: #B794F4; border-bottom: 1px dotted #7E30E1; }
  .note-h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin: 16px 0 8px; }
  .note-h2 { font-size: 18px; font-weight: 600; margin: 14px 0 6px; }

  /* Mind map canvas */
  .mm-node { cursor: grab; user-select: none; }
  .mm-node:active { cursor: grabbing; }
</style>
</head>
<body>

<div class="flex min-h-screen">

  <!-- ─────────── Main ─────────── -->

<script>
const CLIENTES = [
  { nome: "Galeria Chaves", valor: 2500, status: "ATIVO", email: "contato@galeriachaves.com.br", tags: [{nome:"Cliente Ativo",cor:"#10B981"},{nome:"VIP",cor:"#7E30E1"}] },
  { nome: "Lindóia Shopping", valor: 3800, status: "ATIVO", email: "marketing@lindoiashopping.com.br", tags: [{nome:"Cliente Ativo",cor:"#10B981"}] },
  { nome: "Tavi Papelaria", valor: 1800, status: "ATIVO", email: "tavi@tavi.com.br", tags: [{nome:"Cliente Ativo",cor:"#10B981"}] },
  { nome: "Pipeline Services", valor: 4200, status: "ATIVO", email: "rh@pipeline.com.br", tags: [{nome:"Cliente Ativo",cor:"#10B981"},{nome:"Renovação Próxima",cor:"#F59E0B"}] },
  { nome: "Rua da Praia Shopping", valor: 2800, status: "ATIVO", email: "ana@ruadapraia.com.br", tags: [{nome:"Cliente Ativo",cor:"#10B981"}] },
  { nome: "Conhecer para Transformar", valor: 1500, status: "ATIVO", email: "contato@cpt.org.br", tags: [{nome:"Cliente Ativo",cor:"#10B981"}] },
  { nome: "Canal do Vannucci", valor: 1200, status: "ATIVO", email: "vannucci@youtube.com", tags: [{nome:"Cliente Ativo",cor:"#10B981"}] },
  { nome: "Café Veloso", valor: 0, status: "PROSPECT", email: "novo@cafeveloso.com", tags: [{nome:"Prospect Quente",cor:"#EC4899"}] },
];

const TAGS_GLOBAIS = [
  {nome:"Cliente Ativo",cor:"#10B981"},
  {nome:"Cliente Desativado",cor:"#EF4444"},
  {nome:"Em Onboarding",cor:"#3B82F6"},
  {nome:"Renovação Próxima",cor:"#F59E0B"},
  {nome:"VIP",cor:"#7E30E1"},
  {nome:"Prospect Quente",cor:"#EC4899"},
];

const PAGES = {
  dashboard: { title: "Dashboard", subtitle: "Visão consolidada da operação", render: renderDashboard },
  clientes: { title: "Clientes", subtitle: "8 clientes cadastrados · pipeline de R$ 17.800/mês", render: renderClientes },
  detalhe: { title: "Pipeline Services", subtitle: "Cliente ativo desde Jun/2025 · R$ 4.200/mês", render: renderDetalhe },
  editorial: { title: "Calendário Editorial", subtitle: "32 posts em maio · sincronizado com Google Agenda", render: renderEditorial },
  projetos: { title: "Projetos", subtitle: "9 projetos ativos no pipeline", render: renderKanban },
  tarefas: { title: "Tarefas", subtitle: "14 tarefas — 3 atrasadas · filtro por cliente", render: renderTarefas },
  reunioes: { title: "Reuniões", subtitle: "Histórico, transcrições e action items extraídos", render: renderReunioes },
  reuniaoDetalhe: { title: "Renovação contratual — Pipeline Services", subtitle: "02/05/2026 · 14:00–15:24 · 3 participantes", render: renderReuniaoDetalhe },
  notas: { title: "Notas", subtitle: "Bloco de notas estilo Obsidian · markdown · wikilinks · tags", render: renderNotas },
  mapas: { title: "Mapas Mentais", subtitle: "Canvas livre estilo Excalidraw · brainstorming visual", render: renderMapas },
  financeiro: { title: "Financeiro", subtitle: "MRR, despesas, projeções", render: renderFinanceiro },
  contratos: { title: "Contratos", subtitle: "7 contratos · 2 vencendo nos próximos 30 dias", render: renderContratos },
  drive: { title: "Google Drive", subtitle: "Navegue, pesquise e vincule arquivos", render: renderDrive },
  agenda: { title: "Google Agenda", subtitle: "Sincronizado em tempo real", render: renderAgenda },
  redes: { title: "Redes Sociais", subtitle: "Métricas mensais · comparativo MoM · PDF", render: renderRedes },
  seo: { title: "SEO", subtitle: "Posições, cliques, keywords · Score ponderado", render: renderSeo },
  trafego: { title: "Tráfego Pago", subtitle: "Campanhas, ROAS e investimento por plataforma", render: renderTrafego },
};

function fmtBRL(v) { return new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(v); }
function fmtNum(v) { return new Intl.NumberFormat('pt-BR').format(v); }

function tagBadge(t) { return `<span class="badge" style="background:${t.cor}22;color:${t.cor};border:1px solid ${t.cor}40">${t.nome}</span>`; }
function tagsRow(tags) { return tags.map(tagBadge).join(' '); }
function statusBadge(s) {
  const c = {ATIVO:'success', PROSPECT:'warning', INATIVO:'muted', CHURNED:'destructive', EM_RENOVACAO:'warning'}[s] || 'muted';
  return `<span class="badge badge-${c}">${s.toLowerCase().replace('_',' ')}</span>`;
}

function goto(page) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const navName = ({detalhe:'clientes',reuniaoDetalhe:'reunioes'}[page]) || page;
  const navEl = document.querySelector(`[data-nav="${navName}"]`);
  if (navEl) navEl.classList.add('active');
  const cfg = PAGES[page] || PAGES.dashboard;
  document.getElementById('page-title').textContent = cfg.title;
  document.getElementById('page-subtitle').textContent = cfg.subtitle;
  document.getElementById('content').innerHTML = cfg.render();
  setTimeout(() => lucide.createIcons(), 0);
  window.scrollTo(0, 0);
  if (page === 'mapas') setTimeout(initMindMap, 50);
}

// ═══════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════
function renderDashboard() {
  const mrr = CLIENTES.filter(c => c.status === 'ATIVO').reduce((s,c) => s+c.valor, 0);
  const meses = ['Jun','Jul','Ago','Set','Out','Nov','Dez','Jan','Fev','Mar','Abr','Mai'];
  const valores = [13200, 13500, 14000, 14500, 15800, 16500, 17200, 17800, 17800, 17800, 17800, 17800];
  const max = Math.max(...valores);

  return `
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      ${kpi('MRR Recorrente', fmtBRL(mrr), 'arrow-up-right', '+12.5%', 'good')}
      ${kpi('Clientes ativos', '7', 'users', null)}
      ${kpi('Posts no mês', '32', 'send', '+8', 'good')}
      ${kpi('Tarefas abertas', '14', 'list-checks', '3 atrasadas', 'bad')}
      ${kpi('Projetos ativos', '9', 'kanban-square', null)}
    </div>

    <div class="card p-5" style="background:linear-gradient(180deg,rgba(245,158,11,0.06) 0%,rgba(19,19,28,1) 60%);border-color:rgba(245,158,11,0.25)">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 rounded-lg flex items-center justify-center" style="background:rgba(245,158,11,0.15)"><i data-lucide="alert-triangle" class="w-4 h-4 text-amber-400"></i></div>
          <div>
            <div class="text-[13.5px] font-semibold">Contratos vencendo em 30 dias</div>
            <div class="text-[11px] text-dim mt-0.5">2 contratos exigem ação imediata</div>
          </div>
        </div>
        <button class="btn btn-outline btn-sm">Ver todos <i data-lucide="arrow-right" class="w-3 h-3"></i></button>
      </div>
      <div class="mt-4 grid grid-cols-2 gap-3">
        ${[['Pipeline Services', '15/05/2026', 12, fmtBRL(4200)], ['Tavi Papelaria', '28/05/2026', 25, fmtBRL(1800)]].map(([n,d,dias,v]) => `
          <div class="card p-3.5 flex items-center justify-between">
            <div>
              <div class="font-medium text-[13px]">${n}</div>
              <div class="text-[11px] text-dim mono mt-0.5">${d}</div>
            </div>
            <div class="text-right">
              <div class="text-[13px] mono">${v}</div>
              <span class="badge badge-${dias <= 15 ? 'destructive' : 'warning'} mt-1">${dias} dias</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-4">
      <div class="card md:col-span-2 p-5">
        <div class="flex items-center justify-between mb-1">
          <div>
            <div class="text-[13.5px] font-semibold">Receita recorrente</div>

function kpi(label, value, icon, hint, accent) {
  const cor = accent === 'good' ? '#34D399' : accent === 'bad' ? '#F87171' : '#9696A8';
  return `
    <div class="card card-hover p-4">
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-dim font-medium">${label}</span>
        <i data-lucide="${icon}" class="w-3.5 h-3.5 text-dim2"></i>
      </div>
      <div class="mt-2 display text-[24px] font-semibold tracking-tight">${value}</div>
      ${hint ? `<div class="text-[11px] mt-0.5 mono" style="color:${cor}">${hint}</div>` : '<div class="text-[11px] mt-0.5 text-dim2">—</div>'}
    </div>`;
}

function donutChart() {
  const data = CLIENTES.filter(c => c.status === 'ATIVO').map(c => ({name: c.nome, value: c.valor}));
  const total = data.reduce((s,d) => s+d.value, 0);
  const cores = ["#7E30E1","#10B981","#3B82F6","#F59E0B","#EC4899","#14B8A6","#EF4444"];
  let acc = 0;
  const segs = data.map((d,i) => {
    const start = acc / total * 360;
    acc += d.value;
    const end = acc / total * 360;
    return `<circle cx="100" cy="100" r="55" fill="transparent" stroke="${cores[i]}" stroke-width="22"
      stroke-dasharray="${(end-start)/360 * 345.6} 345.6"
      stroke-dashoffset="${-start/360 * 345.6}"
      transform="rotate(-90 100 100)"/>`;
  }).join('');
  return `
    <div class="flex flex-col items-center">
      <div class="relative">
        <svg viewBox="0 0 200 200" class="w-40 h-40">${segs}</svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <div class="text-[10px] text-dim2 uppercase tracking-wider">Total</div>
          <div class="display font-semibold text-[18px]">${fmtBRL(total).replace(',00','')}</div>
        </div>
      </div>
      <div class="space-y-1 text-[11px] mt-3 w-full">
        ${data.slice(0,4).map((d,i) => `<div class="flex items-center gap-2"><span class="inline-block w-2.5 h-2.5 rounded-sm" style="background:${cores[i]}"></span><span class="text-dim truncate flex-1">${d.name}</span><span class="mono">${Math.round(d.value/total*100)}%</span></div>`).join('')}
      </div>
    </div>`;
}

function listCard(title, icon, items) {
  return `
    <div class="card p-5">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <i data-lucide="${icon}" class="w-3.5 h-3.5 text-dim"></i>
          <div class="text-[13.5px] font-semibold">${title}</div>
        </div>
        <button class="btn-icon"><i data-lucide="more-horizontal" class="w-3.5 h-3.5"></i></button>
      </div>
      <div class="space-y-2.5">
        ${items.map(([t,c,d]) => `
          <div class="flex items-center justify-between gap-2 hover:bg-ink-850 -mx-2 px-2 py-1.5 rounded-md transition cursor-pointer">
            <div class="min-w-0">

}

function renderMarkdown(md) {
  return md
    .replace(/^### (.*)$/gm, '<h3 class="display text-[15px] font-semibold mt-5 mb-2">$1</h3>')
    .replace(/^## (.*)$/gm, '<h2 class="display text-[18px] font-semibold mt-6 mb-3 tracking-tight">$1</h2>')
    .replace(/^# (.*)$/gm, '<h1 class="display text-[28px] font-bold mt-2 mb-4 tracking-tight">$1</h1>')
    .replace(/^> (.*)$/gm, '<blockquote class="border-l-2 border-sal pl-4 py-1 my-3 italic text-dim">$1</blockquote>')
    .replace(/^- (.*)$/gm, '<li class="ml-5 list-disc text-[13.5px] leading-relaxed mb-1">$1</li>')
    .replace(/^(\d+)\. (.*)$/gm, '<li class="ml-5 list-decimal text-[13.5px] leading-relaxed mb-1">$2</li>')
    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-paper font-semibold">$1</strong>')
    .replace(/\[\[(.*?)\]\]/g, '<a class="note-link cursor-pointer">$1</a>')
    .replace(/(#[\wÀ-ÿ]+)/g, '<span class="note-tag">$1</span>')
    .split('\n\n').map(p => p.startsWith('<') ? p : `<p class="text-[13.5px] leading-relaxed mb-3">${p}</p>`).join('');
}

function initMindMap() {
  const svg = document.getElementById('mind-canvas');
  if (!svg) return;
  let dragging = null, offset = {x:0,y:0};
  svg.querySelectorAll('.mm-node').forEach(node => {
    node.addEventListener('mousedown', e => {
      const m = node.getAttribute('transform').match(/translate\((-?[\d.]+),\s*(-?[\d.]+)\)/);
      const tx = m ? +m[1] : 0, ty = m ? +m[2] : 0;
      dragging = node;
      offset = { x: e.clientX - tx, y: e.clientY - ty };
      node.style.cursor = 'grabbing';
    });
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    dragging.setAttribute('transform', `translate(${e.clientX - offset.x}, ${e.clientY - offset.y})`);
  });
  document.addEventListener('mouseup', () => { if (dragging) dragging.style.cursor='grab'; dragging = null; });
}

function comp(l, v, delta, up) {
  const cor = up===null?'#9696A8':up?'#34D399':'#F87171';
  return `<div class="card p-4">
    <div class="text-[11px] text-dim font-medium">${l}</div>
    <div class="mt-2 display text-[24px] font-semibold tracking-tight">${v}</div>
    ${delta ? `<div class="text-[11px] mt-0.5 mono flex items-center gap-1" style="color:${cor}">${up===null?'':up?'<i data-lucide="arrow-up" class="w-3 h-3"></i>':'<i data-lucide="arrow-down" class="w-3 h-3"></i>'} ${delta}</div>` : ''}
  </div>`;
}
function lineChart(labels, values, color) {
  const max = Math.max(...values);
  const w = 400, h = 160, pad = 24;
  const xs = (i) => pad + i * (w - pad*2) / (values.length - 1);
  const ys = (v) => h - pad - (v/max) * (h - pad*2);
  const path = values.map((v,i) => (i===0?'M':'L') + ' ' + xs(i) + ' ' + ys(v)).join(' ');
  const area = path + ` L ${xs(values.length-1)} ${h-pad} L ${xs(0)} ${h-pad} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full h-44">
    <defs><linearGradient id="grad-${color.slice(1)}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.4"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#grad-${color.slice(1)})"/>
    <path d="${path}" stroke="${color}" stroke-width="2" fill="none"/>
    ${values.map((v,i) => `<circle cx="${xs(i)}" cy="${ys(v)}" r="3.5" fill="${color}" stroke="#0E0E14" stroke-width="2"/>`).join('')}
    ${labels.map((l,i) => `<text x="${xs(i)}" y="${h-6}" text-anchor="middle" font-size="10" fill="#9696A8" font-family="Inter">${l}</text>`).join('')}
  </svg>`;
}
